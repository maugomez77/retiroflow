services:
  - type: web
    name: retiroflow-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: retiroflow serve
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: retiroflow-db
          property: connectionString
      - key: RETIROFLOW_ENV
        value: production

databases:
  - name: retiroflow-db
    plan: starter
    databaseName: retiroflow
    user: retiroflow
